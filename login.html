<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke Sistem - UAS</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ffcbd9; /* Tema Soft Pink Solid agar serasi */
            text-align: center; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            box-sizing: border-box;
        }
        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1); 
            max-width: 360px;
            width: 100%;
            box-sizing: border-box;
        }
        .icon-key {
            font-size: 45px;
            color: #ff527b;
            margin-bottom: 5px;
        }
        h2 {
            margin: 0 0 10px 0;
            color: #2d3436;
            font-size: 26px;
        }
        .subtitle {
            font-size: 13px;
            color: #636e72;
            margin-bottom: 25px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #ffcbd9; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #ff527b;
        }
        button { 
            background-color: #ff527b; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover { 
            background-color: #e03d64; 
        }
        p {
            margin-top: 20px;
            font-size: 14px;
            color: #636e72;
        }
        a { 
            text-decoration: none; 
            color: #ff527b; 
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <!-- Library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="icon-key">🔑</div>
        <h2>Login Pengguna</h2>
        <p class="subtitle">Log in to manage your daily tasks on Cloud System</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Masukkan Email" required>
            <input type="password" id="password" placeholder="Masukkan Password" required>
            <button type="submit">Masuk</button>
        </form>
        
        <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
    </div>

    <script>
        // Bagian kredensial Supabase yang sudah terhubung dengan benar
        const SUPABASE_URL = "https://avcoiavgfiinryfkqnqc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_HFocaDjxEwcZEGpcrsqjww_aWgXeAhO";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Proses verifikasi akun login ke cloud
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert('Gagal masuk: ' + error.message);
            } else {
                alert('Login Berhasil! Mengalihkan ke dashboard...');
                window.location.href = "index.html"; 
            }
        });
    </script>
</body>
</html>
